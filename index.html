<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>STTT Spotlight Series</title>
    <script>
      (() => {
        const targetOrigin = 'https://uchicago.oneamyloidosisvoice.com';
        const cityOfHopeOrigin = 'https://cityofhope.oneamyloidosisvoice.com';
        const isGitHubPagesProject =
          window.location.hostname === 'askit-inc.github.io' &&
          window.location.pathname.startsWith('/spotlight-series-microsite');
        const isCohLegacyRoute = window.location.hash === '#/spotlight/coh/v1';

        if (
          isCohLegacyRoute &&
          (isGitHubPagesProject || window.location.origin === targetOrigin)
        ) {
          window.location.replace(`${cityOfHopeOrigin}/`);
          return;
        }

        if (isGitHubPagesProject) {
          window.location.replace(`${targetOrigin}/`);
          return;
        }

        if (window.location.origin === targetOrigin && window.location.hash) {
          window.location.replace(`${targetOrigin}${window.location.pathname}${window.location.search}`);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
